<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PalQum | Digital Ecosystem</title>
    <style>
        :root {
            --accent: #00d4ff;
            --glass: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0a0c;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-attachment: fixed;
            color: white;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px; /* Widened slightly to accommodate the grid */
            padding: 60px 15px;
            text-align: center;
        }

        header {
            margin-bottom: 50px;
            animation: fadeInDown 1s ease forwards;
        }

        .logo-ring {
            width: 80px;
            height: 80px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            animation: pulse 2s infinite;
        }

        .logo-text {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* CHANGED: Flex to Grid for 3-column layout */
        #profile-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Exactly 3 per row */
            gap: 12px;
        }

        .profile-link {
            position: relative;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            color: white;
            text-decoration: none;
            padding: 15px 5px; /* Reduced padding for grid fit */
            border-radius: 16px;
            font-weight: 500;
            font-size: 0.85rem; /* Smaller font to prevent overflow */
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            text-transform: capitalize;
            display: flex;
            flex-direction: column; /* Stack text and icon vertically */
            justify-content: center;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transform: translateY(20px);
            word-break: break-word; /* Handle long names */
        }

        .profile-link:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--accent);
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(0, 212, 255, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 212, 255, 0); }
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Responsive adjustment for very small screens */
        @media (max-width: 360px) {
            #profile-list { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="container">
<header>
    <div class="logo-ring">
        <img src="https://raw.githubusercontent.com/PalQum0/Nfccard/main/logo.PNG" 
             alt="PalQum Logo" 
             style="width: 70%; height: 70%; object-fit: contain;">
    </div>
    <div class="logo-text">PalQum</div>
    <p style="color:rgba(255,255,255,0.5); margin-top:10px; font-size:0.8rem; letter-spacing:3px;">PREMIUM NFC NETWORK</p>
</header>
    

    <div id="status">
        <div class="loader"></div>
    </div>
    
    <div id="profile-list"></div>
</div>

<script>
    const GITHUB_USER = "PalQum0"; 
    const GITHUB_REPO = "Nfccard";

    async function loadProfiles() {
        const list = document.getElementById('profile-list');
        const status = document.getElementById('status');
        
        try {
            const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
            const data = await response.json();
            
            status.innerHTML = '';

            const folders = data.filter(item => item.type === 'dir' && !item.name.startsWith('.'));

            folders.forEach((folder, index) => {
                const a = document.createElement('a');
                a.href = `https://palqum.site/${folder.name}/`;
                a.className = 'profile-link';
                a.innerHTML = `
                    <span>${folder.name.replace(/[-_]/g, ' ')}</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                `;
                
                a.style.animation = `fadeInUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards`;
                a.style.animationDelay = `${0.2 + (index * 0.05)}s`;
                
                list.appendChild(a);
            });

        } catch (e) {
            status.innerHTML = '<p>Offline Mode: Connection Error</p>';
        }
    }

    loadProfiles();
</script>

</body>
</html>
