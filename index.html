<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PalQum | NFC Profiles</title>
    <style>
        :root {
            --primary-color: #007AFF; 
            --bg-gradient: linear-gradient(135deg, #0f0f0f 0%, #252525 100%);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }

        .container {
            width: 90%;
            max-width: 420px;
            margin-top: 60px;
            text-align: center;
            padding: 20px;
        }

        .logo-area {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 5px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #777;
            margin-bottom: 40px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #profile-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .profile-link {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            padding: 20px;
            border-radius: 18px;
            font-weight: 500;
            font-size: 1.05rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: capitalize;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .profile-link::after {
            content: '→';
            opacity: 0.5;
            font-size: 1.2rem;
        }

        .profile-link:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-3px);
            border-color: var(--primary-color);
        }

        .loader {
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid #fff;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .error-msg {
            color: #ff6b6b;
            padding: 20px;
            font-size: 0.9rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">PalQum</div>
    <div class="subtitle">NFC Digital Cards</div>

    <div id="status-container">
        <div class="loader" id="loader"></div>
    </div>
    
    <div id="profile-list"></div>
</div>

<script>
    // These are now correctly set based on your link
    const GITHUB_USER = "PalQum0"; 
    const GITHUB_REPO = "Nfccard";

    async function loadProfiles() {
        const profileList = document.getElementById('profile-list');
        const statusContainer = document.getElementById('status-container');
        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`;

        try {
            const response = await fetch(url);
            
            if (!response.ok) {
                throw new Error("Could not connect to the profile database.");
            }

            const data = await response.json();
            statusContainer.innerHTML = ''; 

            // Filter for directories and ignore non-profile folders
            const folders = data.filter(item => 
                item.type === 'dir' && 
                !item.name.startsWith('.') && 
                item.name !== 'assets' // If you ever add an assets folder, this ignores it
            );

            if (folders.length === 0) {
                statusContainer.innerHTML = '<p style="color:#555">No active profiles found.</p>';
                return;
            }

            folders.forEach(folder => {
                const link = document.createElement('a');
                // Use absolute path from root for the custom domain
                link.href = `https://palqum.site/${folder.name}/`; 
                link.className = 'profile-link';
                link.innerText = folder.name.replace(/[-_]/g, ' ');
                profileList.appendChild(link);
            });

        } catch (error) {
            statusContainer.innerHTML = `<div class="error-msg">Unable to load profiles. Please try again later.</div>`;
            console.error("API Error:", error);
        }
    }

    loadProfiles();
</script>

</body>
</html>
