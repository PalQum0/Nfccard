<html lang="ar" dir="rtl">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
            background-color: #111;
        }

        /* Background image layer */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url('https://palqum.com/nfclogos/drfadi2.jpg');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #111;
            z-index: 0;
        }

        /* Dark overlay for readability */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        /* ===== CARD ===== */
        .profile-card {
            background: rgba(20, 20, 20, 0.65);
            backdrop-filter: blur(1px);
            -webkit-backdrop-filter: blur(1px);
            border: 1px solid rgba(255, 255, 240, 0.2);
            border-radius: 28px;
            padding: 48px 36px 36px;
            max-width: 460px;
            width: 100%;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
            animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(32px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ===== HEADER ===== */
        .profile-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .profile-image {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: 0 auto 20px;
            box-shadow: 0 0 0 4px rgba(255,255,240,0.15), 0 0 40px rgba(255,255,240,0.1);
            animation: scaleIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
            transition: transform 0.3s ease;
        }

        .profile-image:hover {
            transform: scale(1.05);
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.8); }
            to   { opacity: 1; transform: scale(1); }
        }

        .profile-name {
            font-size: 28px;
            font-weight: 800;
            color: #FFFFF0;
            margin-bottom: 6px;
            animation: slideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
        }

        .profile-title {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255,255,240,0.7);
            animation: slideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ===== LINKS ===== */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,240,0.15);
            border-radius: 50px;
            padding: 15px 24px;
            text-decoration: none;
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.25s ease;
            opacity: 0;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .link-item:hover {
            background: rgba(255,255,255,0.14);
            border-color: rgba(255,255,240,0.35);
            transform: translateY(-2px);
        }

        .link-item:active {
            transform: translateY(0);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .link-item:nth-child(1) { animation-delay: 0.5s; }
        .link-item:nth-child(2) { animation-delay: 0.6s; }
        .link-item:nth-child(3) { animation-delay: 0.7s; }
        .link-item:nth-child(4) { animation-delay: 0.8s; }
        .link-item:nth-child(5) { animation-delay: 0.9s; }
        .link-item:nth-child(6) { animation-delay: 1.0s; }

        .link-icon {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        /* ===== SOCIAL ===== */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 14px;
            padding-top: 20px;
        }

        .social-link {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,240,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.25s ease;
            opacity: 0;
            animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .social-link:nth-child(1) { animation-delay: 1.1s; }
        .social-link:nth-child(2) { animation-delay: 1.2s; }
        .social-link:nth-child(3) { animation-delay: 1.3s; }

        .social-link:hover {
            background: rgba(255,255,255,0.14);
            border-color: rgba(255,255,240,0.35);
            transform: translateY(-3px) scale(1.08);
        }

        .social-icon {
            width: 20px;
            height: 20px;
        }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            margin-top: 24px;
            animation: fadeIn 1s ease 1.4s both;
        }

        .footer p {
            font-size: 12px;
            color: rgba(255,255,255,0.35);
        }

        .footer a {
            color: rgba(255,255,240,0.6);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: #FFFFF0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .profile-card {
                padding: 36px 24px 28px;
            }
            .profile-image {
                width: 95px;
                height: 95px;
            }
            .profile-name {
                font-size: 24px;
            }
            .link-item {
                padding: 14px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
